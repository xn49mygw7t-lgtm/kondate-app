<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>献立アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F5F5F7;--card:#fff;--primary:#FF6B35;--secondary:#FF8E53;--accent:#2C3E50;--text:#1a1a2e;--sub:#6c757d;--border:#e8e8e8;--safe:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(70px + var(--safe));overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* Top header */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);padding:16px 16px 8px;backdrop-filter:blur(10px)}
.hdr h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:12px;color:var(--sub);margin-top:2px}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:var(--safe)}
.nav-btn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--sub);font-size:10px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--primary)}
.nav-btn .icon{font-size:22px}

/* Cards */
.card{background:var(--card);border-radius:16px;padding:16px;margin:0 16px 12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-sm{background:var(--card);border-radius:12px;padding:12px 14px;margin:0 16px 8px;box-shadow:0 1px 4px rgba(0,0,0,.05)}

/* Home screen */
.home-hero{margin:0 16px 16px;padding:20px;border-radius:20px;background:linear-gradient(135deg,#FF6B35,#FF8E53);color:#fff}
.home-hero h2{font-size:18px;font-weight:700}
.home-hero p{font-size:13px;opacity:.85;margin-top:4px}
.picker-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.picker-label{font-size:13px;opacity:.9;white-space:nowrap}
.picker-ctrl{display:flex;align-items:center;gap:8px;margin-left:auto}
.picker-val{font-size:22px;font-weight:700;min-width:36px;text-align:center}
.picker-btn{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300}
.btn-gen{width:calc(100% - 32px);margin:0 16px 16px;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#FF6B35,#FF8E53);color:#fff;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(255,107,53,.4);letter-spacing:.5px}
.btn-gen:active{transform:scale(.98);opacity:.9}

/* Plan screen */
.day-card{background:var(--card);border-radius:16px;margin:0 16px 12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.day-hdr{padding:12px 16px 10px;background:linear-gradient(135deg,rgba(255,107,53,.1),rgba(255,142,83,.1));border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.day-hdr .day-label{font-size:14px;font-weight:700;color:var(--primary)}
.day-hdr .day-date{font-size:12px;color:var(--sub)}
.dish-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;transition:background .15s}
.dish-row:last-child{border-bottom:none}
.dish-row:active{background:#f9f9f9}
.dish-emoji{font-size:24px;flex-shrink:0}
.dish-info{flex:1;min-width:0}
.dish-role{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dish-name{font-size:14px;font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dish-meta{font-size:11px;color:var(--sub);margin-top:2px}
.regen-btn{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:#f5f5f5;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.regen-btn:active{background:#efefef}

/* Recipe screen */
.recipe-hero{margin:0 16px 16px;border-radius:20px;padding:24px 20px;color:#fff;position:relative;overflow:hidden}
.recipe-hero::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15)}
.recipe-hero-content{position:relative;z-index:1}
.recipe-emoji{font-size:52px;margin-bottom:8px;display:block}
.recipe-name{font-size:22px;font-weight:700;line-height:1.2}
.recipe-desc{font-size:13px;opacity:.9;margin-top:8px;line-height:1.5}
.recipe-tags{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{background:rgba(255,255,255,.25);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.section-title{font-size:15px;font-weight:700;color:var(--accent);margin:16px 16px 8px;display:flex;align-items:center;gap:6px}
.ing-item{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.ing-item:last-child{border-bottom:none}
.ing-name{font-size:14px}
.ing-amt{font-size:13px;color:var(--primary);font-weight:600}
.step-item{padding:14px;border-bottom:1px solid var(--border)}
.step-item:last-child{border-bottom:none}
.step-num{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px}
.step-title{font-size:14px;font-weight:700;margin-bottom:6px}
.step-desc{font-size:13px;color:var(--sub);line-height:1.6}
.step-tip{margin-top:8px;background:rgba(255,107,53,.08);border-left:3px solid var(--primary);padding:6px 10px;border-radius:0 8px 8px 0;font-size:12px;color:var(--primary)}
.back-btn{display:flex;align-items:center;gap:6px;padding:12px 16px;font-size:15px;color:var(--primary);background:none;border:none;cursor:pointer;font-weight:600}
.source-note{font-size:11px;color:var(--sub);text-align:center;padding:8px 16px 16px}

/* Shopping screen */
.cat-section{margin:0 16px 12px}
.cat-title{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px;padding-left:4px;text-transform:uppercase;letter-spacing:.5px}
.shop-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border-radius:12px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:opacity .2s}
.shop-item.checked{opacity:.4}
.shop-item.checked .shop-name{text-decoration:line-through}
.shop-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.shop-item.checked .shop-check{background:var(--primary);border-color:var(--primary);color:#fff}
.shop-name{font-size:14px;flex:1}
.shop-amt{font-size:13px;color:var(--primary);font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-state .e-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}

/* Dish row actions */
.dish-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.del-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid #ffcdd2;background:#fff5f5;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.del-btn:active{background:#ffebee}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 14px;padding:10px;border:1.5px dashed var(--border);border-radius:10px;background:none;color:var(--sub);font-size:13px;cursor:pointer;width:calc(100% - 28px)}
.add-btn:active{background:#f5f5f5}
.guide-btn{padding:6px 12px;border:1.5px solid var(--primary);border-radius:20px;background:none;color:var(--primary);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.guide-btn:active{background:rgba(255,107,53,.1)}
.kcal-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:12px;white-space:nowrap}
.kcal-ok{background:#e8f5e9;color:#2e7d32}
.kcal-mid{background:#fff8e1;color:#f57f17}
.kcal-hi{background:#ffebee;color:#c62828}
.day-hdr{flex-wrap:wrap;gap:4px}
.print-btn{padding:6px 14px;border:1.5px solid var(--primary);border-radius:20px;background:none;color:var(--primary);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.print-btn:active{background:rgba(255,107,53,.1)}
@media print{.nav,.print-btn,.regen-btn,.del-btn,.add-btn,.guide-btn,.hdr .sub{display:none!important}.screen{display:block!important}.day-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}.dish-row{cursor:default}body{padding-bottom:0}}

/* Guide screen */
.guide-day-info{margin:0 16px 16px;padding:14px 16px;background:linear-gradient(135deg,rgba(255,107,53,.12),rgba(255,142,83,.12));border-radius:14px}
.guide-day-label{font-size:13px;font-weight:700;color:var(--primary)}
.guide-day-dishes{font-size:12px;color:var(--sub);margin-top:3px}
/* Guide ingredient summary */
.guide-ing-dish{margin:0 16px 6px}
.guide-ing-dish summary{font-size:13px;font-weight:700;color:var(--accent);padding:10px 14px;background:var(--card);border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:6px;list-style:none;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.guide-ing-dish summary::-webkit-details-marker{display:none}
.guide-ing-dish[open] summary{border-radius:12px 12px 0 0;border-bottom:1px solid var(--border)}
.guide-ing-dish-body{background:var(--card);border-radius:0 0 12px 12px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
.guide-ing-row{display:flex;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);font-size:13px}
.guide-ing-row:first-child{border-top:none}
.guide-ing-amt{color:var(--primary);font-weight:600}

/* Timeline */
.timeline-container{padding:0 16px}
.timeline-step{display:flex;gap:10px;align-items:flex-start}
.timeline-left{display:flex;flex-direction:column;align-items:center;width:52px;flex-shrink:0}
.timeline-time{font-size:10px;font-weight:700;color:var(--primary);white-space:nowrap;padding-top:14px;text-align:center}
.timeline-line{flex:1;width:2px;background:var(--border);margin-top:4px;min-height:20px}
.timeline-card{flex:1;background:var(--card);border-radius:14px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.timeline-dish-tag{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.timeline-dish-emoji{font-size:16px}
.timeline-dish-name{font-size:11px;color:var(--sub);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-duration{font-size:10px;background:rgba(255,107,53,.1);color:var(--primary);padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.timeline-step-title{font-size:14px;font-weight:700;margin-bottom:4px}
.timeline-step-desc{font-size:12px;color:var(--sub);line-height:1.55}
.timeline-tip{margin-top:6px;background:rgba(255,107,53,.08);border-left:3px solid var(--primary);padding:5px 9px;border-radius:0 7px 7px 0;font-size:11px;color:var(--primary)}

/* Recipe editor screen */
.editor-section{margin:0 16px 12px}
.editor-label{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;display:block}
.editor-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff;box-sizing:border-box}
.editor-input:focus{border-color:var(--primary)}
.editor-emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.editor-emoji-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.editor-emoji-btn.selected{border-color:var(--primary);background:rgba(255,107,53,.1)}
.editor-role-row{display:flex;gap:8px}
.editor-role-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
.editor-role-btn.selected{border-color:var(--primary);background:var(--primary);color:#fff}
.ing-editor-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ing-editor-row input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.ing-editor-row input:focus{border-color:var(--primary)}
.ing-editor-row .del-row-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1.5px solid #ffcdd2;background:#fff5f5;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.step-editor-card{background:#f5f5f7;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.step-editor-card input,.step-editor-card textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;background:#fff;box-sizing:border-box;margin-bottom:6px}
.step-editor-card input:focus,.step-editor-card textarea:focus{border-color:var(--primary)}
.step-editor-card textarea{resize:vertical;min-height:60px}
.step-editor-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.step-num-label{font-size:11px;font-weight:700;color:var(--primary)}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:9px 12px;border:1.5px dashed var(--border);border-radius:10px;background:none;color:var(--sub);font-size:13px;cursor:pointer;width:100%}
.btn-save{width:calc(100% - 32px);margin:0 16px 8px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#FF6B35,#FF8E53);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.btn-delete-recipe{width:calc(100% - 32px);margin:0 16px 24px;padding:12px;border:1.5px solid #ffcdd2;border-radius:14px;background:#fff5f5;color:#e53935;font-size:14px;font-weight:600;cursor:pointer}
.edit-recipe-btn{padding:6px 12px;border:1.5px solid var(--sub);border-radius:20px;background:none;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;margin-left:auto}

/* Add modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:82vh;display:flex;flex-direction:column}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-title{font-size:16px;font-weight:700;padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.modal-tabs{display:flex;padding:10px 16px 6px;gap:8px}
.modal-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:none;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer}
.modal-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.modal-search{margin:6px 16px 10px;display:flex;align-items:center;gap:8px;background:#f5f5f7;border-radius:10px;padding:8px 12px}
.modal-search input{border:none;background:none;flex:1;font-size:14px;outline:none}
.modal-list{overflow-y:auto;flex:1;padding-bottom:calc(16px + var(--safe))}
.modal-recipe-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px}
.modal-recipe-row:active{background:#f9f9f9}
.modal-recipe-emoji{font-size:22px;flex-shrink:0}
.modal-recipe-info{flex:1;min-width:0}
.modal-recipe-role{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.4px}
.modal-recipe-name{font-size:14px;font-weight:600;margin-top:1px}
.modal-recipe-meta{font-size:11px;color:var(--sub);margin-top:2px}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="hdr">
    <h1>献立アプリ</h1>
  </div>
  <div class="home-hero">
    <h2>夕食の献立を自動生成</h2>
    <p>人気レシピから毎日の夕食を提案します</p>
    <div class="picker-row">
      <span class="picker-label">日数</span>
      <div class="picker-ctrl">
        <button class="picker-btn" onclick="adj('days',-1)">−</button>
        <span class="picker-val" id="days-val">5</span>
        <button class="picker-btn" onclick="adj('days',1)">＋</button>
      </div>
    </div>
    <div class="picker-row">
      <span class="picker-label">品数</span>
      <div class="picker-ctrl">
        <button class="picker-btn" onclick="adj('dishes',-1)">−</button>
        <span class="picker-val" id="dishes-val">3</span>
        <button class="picker-btn" onclick="adj('dishes',1)">＋</button>
      </div>
    </div>
    <div class="picker-row">
      <span class="picker-label">人数</span>
      <div class="picker-ctrl">
        <button class="picker-btn" onclick="adj('persons',-1)">−</button>
        <span class="picker-val" id="persons-val">2</span>
        <button class="picker-btn" onclick="adj('persons',1)">＋</button>
      </div>
    </div>
  </div>
  <button class="btn-gen" onclick="generate()">✨ 献立を生成する</button>
  <button class="btn-gen" onclick="openEditor(null)" style="background:linear-gradient(135deg,#2C3E50,#4A6080);margin-top:-8px;box-shadow:0 4px 14px rgba(44,62,80,.3)">＋ レシピを追加</button>
  <div id="home-notice" class="card-sm" style="text-align:center;color:var(--sub);font-size:13px;display:none">
    献立を生成しました！「献立」タブで確認してください
  </div>
</div>

<!-- PLAN -->
<div class="screen" id="s-plan">
  <div class="hdr" style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1>献立</h1>
      <div class="sub" id="plan-sub"></div>
    </div>
    <button class="print-btn" onclick="window.print()" title="印刷・PDF保存">🖨️ 保存</button>
  </div>
  <div id="plan-list">
    <div class="empty-state">
      <div class="e-icon">📅</div>
      <p>まだ献立がありません<br>ホームから生成してください</p>
    </div>
  </div>
</div>

<!-- RECIPE -->
<div class="screen" id="s-recipe">
  <button class="back-btn" onclick="goBack()">← 戻る</button>
  <div id="recipe-content"></div>
</div>

<!-- SHOPPING -->
<div class="screen" id="s-shop">
  <div class="hdr">
    <h1>買い物リスト</h1>
    <div class="sub" id="shop-sub"></div>
  </div>
  <div id="shop-list">
    <div class="empty-state">
      <div class="e-icon">🛒</div>
      <p>まだ献立がありません<br>ホームから生成してください</p>
    </div>
  </div>
</div>

<!-- GUIDE -->
<div class="screen" id="s-guide">
  <button class="back-btn" onclick="goBack()">← 戻る</button>
  <div id="guide-content"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">おかずを選ぶ</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-all" onclick="setAddFilter('all')">すべて</button>
      <button class="modal-tab" id="tab-main" onclick="setAddFilter('main')">主菜</button>
      <button class="modal-tab" id="tab-side" onclick="setAddFilter('side')">副菜</button>
    </div>
    <div class="modal-search">
      <span>🔍</span>
      <input type="text" id="add-search-input" placeholder="レシピを検索..." oninput="setAddSearch(this.value)">
    </div>
    <div class="modal-list" id="add-modal-list"></div>
  </div>
</div>

<!-- RECIPE EDITOR -->
<div class="screen" id="s-editor">
  <div class="hdr" style="display:flex;align-items:center;justify-content:space-between">
    <button class="back-btn" style="padding:0" onclick="goBack()">← 戻る</button>
    <h1 id="editor-title" style="font-size:18px">レシピを編集</h1>
    <div style="width:60px"></div>
  </div>
  <div class="editor-section">
    <label class="editor-label">料理名</label>
    <input class="editor-input" id="ed-name" type="text" placeholder="例: 生姜焼き">
  </div>
  <div class="editor-section">
    <label class="editor-label">絵文字</label>
    <div class="editor-emoji-row" id="ed-emoji-row">
      <button class="editor-emoji-btn selected" id="ed-emoji-selected" onclick="openEmojiPicker()">🍳</button>
      <span style="font-size:12px;color:var(--sub);align-self:center">← タップして変更</span>
    </div>
    <input class="editor-input" id="ed-emoji-input" type="text" maxlength="2" placeholder="絵文字を直接入力" oninput="setEditorEmoji(this.value)" style="margin-top:6px">
  </div>
  <div class="editor-section">
    <label class="editor-label">種別</label>
    <div class="editor-role-row">

function adj(key, d) {
  if(key==='days') S.days = Math.min(14, Math.max(1, S.days+d));
  if(key==='dishes') S.dishes = Math.min(3, Math.max(1, S.dishes+d));

function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function pickUnique(pool, count) {
  const s=shuffle(pool);
  if(s.length>=count) return s.slice(0,count);
  // if pool smaller than count, allow repeats
  const res=[];
  for(let i=0;i<count;i++) res.push(s[i%s.length]);
  return res;
}

function dateStr(offset) {
  const d=new Date(); d.setDate(d.getDate()+offset);
  const days=['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}

// 汁物ID一覧（1日1品まで）
const SOUP_IDS = new Set([27, 28, 29, 30, 56, 62]);
// 肉（豚・牛・合挽き）系の主菜
const MEAT_MAIN_IDS = new Set([1,3,5,6,9,11,16,17,18,19,20,37,40,48]);
// 鶏系の主菜
const CHICKEN_MAIN_IDS = new Set([2,4,7,8,12,13,14,15,36,38,39,49,51]);
// 肉が主役の副菜（肉主菜と重複させない）
const MEAT_SIDE_IDS = new Set([29,31]); // 豚汁, ピーマンの肉詰め
// 鶏が主役の副菜
const CHICKEN_SIDE_IDS = new Set([32]); // 筑前煮

// ===================== GENERATE =====================
function generate() {
  S.plan=[];
  const mPool=shuffle(MAINS);
  const sPool=shuffle(SIDES);
  let mi=0, si=0;
  for(let i=0;i<S.days;i++){
    const main=mPool[mi%mPool.length]; mi++;
    const sides=[];
    let hasSoup=false;
    for(let j=0;j<S.dishes-1;j++){
      // 候補を絞る（汁物重複・肉重複を避ける）
      let candidates=sPool.filter(r=>{
        if(hasSoup && SOUP_IDS.has(r.id)) return false;
        if(MEAT_MAIN_IDS.has(main.id) && MEAT_SIDE_IDS.has(r.id)) return false;
        if(CHICKEN_MAIN_IDS.has(main.id) && CHICKEN_SIDE_IDS.has(r.id)) return false;
        return true;
      });
      // フォールバック（汁物だけ除外）
      if(!candidates.length) candidates=sPool.filter(r=>!hasSoup||!SOUP_IDS.has(r.id));
      if(!candidates.length) candidates=sPool;
      const pick=candidates[si%candidates.length]; si++;
      if(SOUP_IDS.has(pick.id)) hasSoup=true;
      sides.push(pick);
    }
    S.plan.push({date:dateStr(i), main, sides});
  }
  S.checked.clear();
  savePlan();
  renderPlan();
  renderShop();
  document.getElementById('home-notice').style.display='block';
  goScreen('plan');
}

function regenDish(dayIdx, type, sideIdx) {
  const day=S.plan[dayIdx];
  if(type==='main'){
    const used=S.plan.map(d=>d.main.id);
    const avail=MAINS.filter(r=>r.id!==day.main.id);
    const pick=avail.length>0?shuffle(avail)[0]:shuffle(MAINS)[0];
    day.main=pick;
  } else {
    const cur=day.sides[sideIdx];
    const avail=SIDES.filter(r=>r.id!==cur.id);
    const pick=avail.length>0?shuffle(avail)[0]:shuffle(SIDES)[0];
    day.sides[sideIdx]=pick;
  }
  S.checked.clear();
  savePlan();
  renderPlan();
  renderShop();
}

// ===================== PLAN SAVE/RESTORE =====================
function savePlan() {
  if(!S.plan.length) return;
  const data={
    plan:S.plan.map(d=>({date:d.date,mainId:d.main?d.main.id:null,sideIds:d.sides.map(s=>s.id)})),
    days:S.days,dishes:S.dishes,persons:S.persons
  };
  localStorage.setItem('savedPlan',JSON.stringify(data));
}

function restorePlan() {
  const saved=localStorage.getItem('savedPlan');
  if(!saved) return;
  try {
    const {plan,days,dishes,persons}=JSON.parse(saved);
    const all=getAllRecipes();
    S.days=days; S.dishes=dishes; S.persons=persons;
    S.plan=plan.map(d=>({
      date:d.date,
      main:d.mainId!=null?all.find(r=>r.id===d.mainId)||null:null,
      sides:(d.sideIds||[]).map(id=>all.find(r=>r.id===id)).filter(Boolean)
    }));
    document.getElementById('home-notice').style.display='block';
    renderPlan(); renderShop();
  } catch(e){}
}

    <div class="section-title">👨‍🍳 作り方</div>
    <div class="card" style="padding:0;overflow:hidden">
      ${r.steps.map((s,i)=>`
      <div class="step-item">
        <div class="step-num">STEP ${i+1}</div>
        <div class="step-title">${s.t}</div>
        <div class="step-desc">${s.d}</div>
        ${s.tip?`<div class="step-tip">💡 ${s.tip}</div>`:''}
      </div>`).join('')}
    </div>
    <div style="margin:0 16px 4px;display:flex;justify-content:flex-end">
      <button class="edit-recipe-btn" onclick="openEditor(${r.id})">✏️ 編集</button>
    </div>
    <div class="source-note">レシピ：${r.source}</div>
  `;
  goScreen('recipe');
}

function goBack() {
  goScreen(S.prevScreen);
}

// ===================== AMOUNT COMBINER =====================
const SPECIALS=['少々','適量','少量','ひとつまみ','適宜','お好みで','少し'];

// 2つの量を足して合計文字列を返す。単位が合わない場合はnullを返す
function tryAdd(a1, a2) {
  if(SPECIALS.includes(a1)&&SPECIALS.includes(a2)) return a1;
  if(SPECIALS.includes(a1)||SPECIALS.includes(a2)) return null;
  const T1=a1.match(/^大さじ([\d.]+)$/), T2=a2.match(/^大さじ([\d.]+)$/);
  if(T1&&T2){const s=parseFloat(T1[1])+parseFloat(T2[1]);return '大さじ'+(Number.isInteger(s)?s:s.toFixed(1));}
  const t1=a1.match(/^小さじ([\d.]+)$/), t2=a2.match(/^小さじ([\d.]+)$/);
  if(t1&&t2){const s=parseFloat(t1[1])+parseFloat(t2[1]);return '小さじ'+(Number.isInteger(s)?s:s.toFixed(1));}
  const u1=a1.match(/^([\d.]+)\s*(g|ml|cc|kg|L)$/i), u2=a2.match(/^([\d.]+)\s*(g|ml|cc|kg|L)$/i);
  if(u1&&u2&&u1[2].toLowerCase()===u2[2].toLowerCase()){
    const s=parseFloat(u1[1])+parseFloat(u2[1]);
    return (Number.isInteger(s)?s:parseFloat(s.toFixed(1)))+u1[2];
  }
  const c1=a1.match(/^([\d.]+)\s*(個|本|枚|切れ|袋|缶|パック|束|房|片|粒|尾|匹|人前|玉|株)$/);
  const c2=a2.match(/^([\d.]+)\s*(個|本|枚|切れ|袋|缶|パック|束|房|片|粒|尾|匹|人前|玉|株)$/);
  if(c1&&c2&&c1[2]===c2[2]){const s=parseFloat(c1[1])+parseFloat(c2[1]);return (Number.isInteger(s)?s:s.toFixed(1))+c1[2];}
  return null;
}

// parts配列を「合計（内訳）」形式の文字列に変換
function formatAmount(parts) {
  if(parts.length===1) return parts[0];
  // 特殊値のみなら代表値1つ
  if(parts.every(p=>SPECIALS.includes(p))) return parts[0];
  // 全部足してみる
  let total=parts[0];
  let ok=true;
  for(let i=1;i<parts.length;i++){
    const r=tryAdd(total,parts[i]);
    if(r===null){ok=false;break;}
    total=r;
  }
  if(ok) return `${total}（${parts.join('＋')}）`;
  // 足せない場合はそのまま並べる
  return parts.join('＋');
}

// ===================== RENDER SHOPPING =====================
function normalizeIngName(n) {
  return n.trim()
    .replace(/[\u30A1-\u30F6]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60))
    .replace(/\s+/g,'');
}

function renderShop() {
  const el=document.getElementById('shop-list');
  if(!S.plan.length){el.innerHTML='<div class="empty-state"><div class="e-icon">🛒</div><p>まだ献立がありません<br>ホームから生成してください</p></div>';return;}
  // Collect all ingredients and aggregate same-name items (normalize for dedup)
  const allRecipes=[...S.plan.map(d=>d.main).filter(Boolean),...S.plan.flatMap(d=>d.sides)];
  const map={};
  allRecipes.forEach(r=>{
    r.ing.forEach(i=>{
      const key=normalizeIngName(i.n);
      if(!map[key]) map[key]={n:i.n,parts:[i.a],c:i.c,id:key};
      else map[key].parts.push(i.a);
    });
  });
  // Group by category
  const catOrder=['肉類','魚介類','野菜','卵・乳製品','豆腐・大豆','粉類','缶詰','乾物','調味料','主食','その他'];
  const groups={};
  catOrder.forEach(c=>groups[c]=[]);
  groups['その他']=groups['その他']||[];
  Object.values(map).forEach(i=>{
    const c=catOrder.includes(i.c)?i.c:'その他';
    if(!groups[c]) groups[c]=[];
    groups[c].push(i);
  });
  // 未購入を上、購入済みを下にソート
  catOrder.forEach(c=>{ if(groups[c]) groups[c].sort((a,b)=>(S.checked.has(a.id)?1:0)-(S.checked.has(b.id)?1:0)); });
  const total=Object.values(map).length;
  document.getElementById('shop-sub').textContent=`${total}品目`;
  el.innerHTML=catOrder.filter(c=>groups[c]&&groups[c].length).map(c=>`
    <div class="cat-section">
      <div class="cat-title">${c}</div>
      ${groups[c].map(i=>`
      <div class="shop-item ${S.checked.has(i.id)?'checked':''}" onclick="toggleCheck('${i.id}')">
        <div class="shop-check">${S.checked.has(i.id)?'✓':''}</div>
        <span class="shop-name">${i.n}</span>
        <span class="shop-amt">${formatAmount(i.parts)}</span>
      </div>`).join('')}
    </div>`).join('');
}

function toggleCheck(id) {
  if(S.checked.has(id)) S.checked.delete(id); else S.checked.add(id);
  renderShop();
}

// ===================== DELETE DISH =====================
function deleteDish(dayIdx, type, sideIdx) {
  const day = S.plan[dayIdx];
  if(type==='main') { day.main = null; }
  else { day.sides.splice(sideIdx, 1); }
  savePlan(); renderPlan(); renderShop();
}

// ===================== ADD DISH MODAL =====================
function openAddModal(dayIdx, preferRole) {
  S.addTarget = {dayIdx, preferRole};
  S.addFilter = preferRole || 'all';
  S.addSearch = '';
  document.getElementById('add-search-input').value = '';
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  const tabId = S.addFilter==='all'?'tab-all':S.addFilter==='main'?'tab-main':'tab-side';
  document.getElementById(tabId).classList.add('active');
  document.getElementById('add-modal').classList.add('open');
  renderAddModal();
}

function closeAddModal(e) {
  document.getElementById('add-modal').classList.remove('open');
}

function setAddFilter(f) {
  S.addFilter = f;
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+f).classList.add('active');
  renderAddModal();
}

function setAddSearch(v) {
  S.addSearch = v;
  renderAddModal();
}

function renderAddModal() {
  const q = S.addSearch.trim().toLowerCase();
  let list = DB;
  if(S.addFilter!=='all') list = list.filter(r=>r.role===S.addFilter);
  if(q) list = list.filter(r=>r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q));
  const el = document.getElementById('add-modal-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub);font-size:13px">該当するレシピがありません</div>';return;}
  el.innerHTML = list.map(r=>`
    <div class="modal-recipe-row" onclick="addDishToDay(${r.id})">
      <span class="modal-recipe-emoji">${r.emoji}</span>
      <div class="modal-recipe-info">
        <div class="modal-recipe-role">${r.role==='main'?'主菜':'副菜'}</div>
        <div class="modal-recipe-name">${r.name}</div>
        <div class="modal-recipe-meta">⏱ ${r.time}分 · ${r.serve}人前</div>
      </div>
    </div>`).join('');
}

function addDishToDay(recipeId) {
  const recipe = DB.find(r=>r.id===recipeId);
  if(!recipe || !S.addTarget) return;
  const {dayIdx, preferRole} = S.addTarget;
  const day = S.plan[dayIdx];
  if(preferRole==='main' || !day.main) { day.main = recipe; }
  else { day.sides.push(recipe); }
  closeAddModal();
  savePlan(); renderPlan(); renderShop();
}

// ===================== GUIDE SCREEN =====================
function showGuide(dayIdx) {
  S.guideDay = dayIdx;
  const day = S.plan[dayIdx];
  const dishes = [];
  if(day.main) dishes.push(day.main);
  dishes.push(...day.sides);
  if(!dishes.length){alert('献立がありません');return;}
  S.prevScreen = S.curScreen;

  // --- 各ステップに絶対開始時刻を割り当てる ---
  // 最も調理時間が長い料理を0分スタートにし、
  // それ以外は「同時に終わる」ように開始時刻をずらす
  const maxTime = Math.max(...dishes.map(d=>d.time));

  // 各料理ごとに {dish, startAt, steps:[{t,d,tip,min,absStart}]} を構築
  const dishTimelines = dishes.map(dish=>{
    const mins = STEP_MINS[dish.id] || dish.steps.map(()=>Math.round(dish.time/dish.steps.length));
    const dishStart = maxTime - dish.time; // 最長に合わせてずらした開始時刻
    let cursor = dishStart;
    const steps = dish.steps.map((s,i)=>({
      ...s,
      min: mins[i] || 1,
      absStart: cursor,
      absEnd: cursor += (mins[i]||1),
    }));
    return {dish, dishStart, steps};
  });

  // 全ステップを absStart 昇順→料理インデックス昇順でフラット化
  const allSteps = dishTimelines
    .flatMap(dt=>dt.steps.map(s=>({...s, dish:dt.dish})))
    .sort((a,b)=> a.absStart!==b.absStart ? a.absStart-b.absStart : dishes.indexOf(a.dish)-dishes.indexOf(b.dish));

  // 総調理時間
  const totalMin = maxTime;

  // --- HTML生成 ---
  const timelineHtml = allSteps.map((s, i)=>{
    const isLast = i===allSteps.length-1;
    return `
    <div class="timeline-step">
      <div class="timeline-left">
        <div class="timeline-time">${s.absStart}分</div>
        ${isLast?'':`<div class="timeline-line"></div>`}
      </div>
      <div class="timeline-card">
        <div class="timeline-dish-tag">
          <span class="timeline-dish-emoji">${s.dish.emoji}</span>
          <span class="timeline-dish-name">${s.dish.name}</span>
          <span class="timeline-duration">${s.min}分</span>
        </div>
        <div class="timeline-step-title">${s.t}</div>
        <div class="timeline-step-desc">${s.d}</div>
        ${s.tip?`<div class="timeline-tip">💡 ${s.tip}</div>`:''}
      </div>
    </div>`;
  }).join('');

  // --- 材料まとめHTML ---
  const ingHtml = dishes.map(dish=>`
    <details class="guide-ing-dish" open>
      <summary><span>${dish.emoji}</span><span>${dish.name}</span></summary>
      <div class="guide-ing-dish-body">
        ${dish.ing.map(i=>`<div class="guide-ing-row"><span>${i.n}</span><span class="guide-ing-amt">${i.a}</span></div>`).join('')}
      </div>
    </details>`).join('');

  document.getElementById('guide-content').innerHTML=`
    <div class="guide-day-info">
      <div class="guide-day-label">DAY ${dayIdx+1} — ${day.date}（合計 約${totalMin}分）</div>
      <div class="guide-day-dishes">${dishes.map(d=>d.emoji+' '+d.name).join('・')}</div>
    </div>
    <div class="section-title">🥄 今日の材料（${S.persons}人前）</div>
    ${ingHtml}
    <div class="section-title" style="margin-top:16px">⏱ 調理タイムライン</div>
    <div class="timeline-container">${timelineHtml}</div>
    <div style="height:24px"></div>
  `;
  goScreen('guide');
}

// ===================== RECIPE EDITOR =====================
let editorRole = 'main';
let editorEmoji = '🍳';
let editorId = null; // null = new recipe

function openEditor(id) {
  S.prevScreen = S.curScreen;
  editorId = id || null;
  const r = id ? getAllRecipes().find(x=>x.id===id) : null;
  document.getElementById('editor-title').textContent = r ? 'レシピを編集' : 'レシピを追加';
  document.getElementById('ed-name').value = r ? r.name : '';
  document.getElementById('ed-time').value = r ? r.time : '20';
  editorEmoji = r ? r.emoji : '🍳';
  document.getElementById('ed-emoji-selected').textContent = editorEmoji;
  document.getElementById('ed-emoji-input').value = editorEmoji;
  editorRole = r ? r.role : 'main';
  document.getElementById('ed-role-main').classList.toggle('selected', editorRole==='main');
  document.getElementById('ed-role-side').classList.toggle('selected', editorRole==='side');
  // ingredients
  const ings = r ? r.ing : [{n:'',a:'',c:'調味料'}];
  document.getElementById('ed-ing-list').innerHTML = '';
  ings.forEach(i => addIngRow(i.n, i.a, i.c));
  // steps
  const steps = r ? r.steps : [{t:'',d:'',tip:''}];
  document.getElementById('ed-step-list').innerHTML = '';
  steps.forEach(s => addStepRow(s.t, s.d, s.tip||''));
  // delete button
  document.getElementById('ed-delete-btn').style.display = (r && r.id >= 1000) ? 'block' : 'none';
  goScreen('editor');
}

function setEditorRole(role) {
  editorRole = role;
  document.getElementById('ed-role-main').classList.toggle('selected', role==='main');
  document.getElementById('ed-role-side').classList.toggle('selected', role==='side');
}

function setEditorEmoji(val) {
  if(!val) return;
  const chars = [...val];
  editorEmoji = chars[0] || '🍳';
  document.getElementById('ed-emoji-selected').textContent = editorEmoji;
}

function addIngRow(name='', amt='', cat='調味料') {
  const div = document.createElement('div');
  div.className = 'ing-editor-row';
  div.innerHTML = `
    <input type="text" placeholder="材料名" value="${name}" style="flex:2">
    <input type="text" placeholder="量" value="${amt}" style="flex:1">
    <button class="del-row-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('ed-ing-list').appendChild(div);
}

function addStepRow(title='', desc='', tip='') {
  const list = document.getElementById('ed-step-list');
  const idx = list.children.length + 1;
  const div = document.createElement('div');
  div.className = 'step-editor-card';
  div.innerHTML = `
    <div class="step-editor-top">
      <span class="step-num-label">STEP ${idx}</span>
      <button class="del-row-btn" onclick="this.closest('.step-editor-card').remove();renumberSteps()">×</button>
    </div>
    <input type="text" placeholder="タイトル（例: 野菜を切る）" value="${title}">
    <textarea placeholder="手順の説明">${desc}</textarea>
    <input type="text" placeholder="💡 ポイント（任意）" value="${tip}">`;
  list.appendChild(div);
}

function renumberSteps() {
  document.querySelectorAll('#ed-step-list .step-num-label').forEach((el,i)=>{
    el.textContent = `STEP ${i+1}`;
  });
}

function getAllRecipes() {
  const custom = JSON.parse(localStorage.getItem('customRecipes')||'[]');
  return [...DB, ...custom];
}

function saveRecipe() {
  const name = document.getElementById('ed-name').value.trim();
  if(!name){alert('料理名を入力してください');return;}
  const time = parseInt(document.getElementById('ed-time').value)||20;
  // ingredients
  const ingRows = document.querySelectorAll('#ed-ing-list .ing-editor-row');
  const ing = [...ingRows].map(row=>{
    const inputs = row.querySelectorAll('input');
    return {n:inputs[0].value.trim(), a:inputs[1].value.trim(), c:'調味料'};
  }).filter(i=>i.n);
  // steps
  const stepCards = document.querySelectorAll('#ed-step-list .step-editor-card');
  const steps = [...stepCards].map(card=>{
    const inputs = card.querySelectorAll('input');
    const ta = card.querySelector('textarea');
    return {t:inputs[0].value.trim(), d:ta.value.trim(), tip:inputs[1].value.trim()};
  }).filter(s=>s.t||s.d);

  const grads = {main:'linear-gradient(135deg,#FF6B35,#FF8E53)', side:'linear-gradient(135deg,#52B788,#95D5B2)'};
  const custom = JSON.parse(localStorage.getItem('customRecipes')||'[]');

  if(editorId && editorId >= 1000) {
    // update existing custom recipe
    const idx = custom.findIndex(r=>r.id===editorId);
    if(idx>=0) custom[idx] = {...custom[idx], name, emoji:editorEmoji, role:editorRole, time, serve:2, ing, steps, grad:grads[editorRole]};
  } else if(!editorId) {
    // new recipe
    const newId = custom.length > 0 ? Math.max(...custom.map(r=>r.id))+1 : 1000;
    custom.push({id:newId, name, emoji:editorEmoji, role:editorRole, time, serve:2, source:'オリジナル', desc:'', grad:grads[editorRole], ing, steps});
  } else {
    // editing a built-in recipe: save as override
    const existIdx = custom.findIndex(r=>r.id===editorId);
    const base = DB.find(r=>r.id===editorId);
    const updated = {...base, name, emoji:editorEmoji, role:editorRole, time, ing, steps, grad:grads[editorRole]};
    if(existIdx>=0) custom[existIdx]=updated; else custom.push(updated);
  }
  localStorage.setItem('customRecipes', JSON.stringify(custom));
  rebuildDB();
  alert('保存しました！');
  goBack();
}

function deleteRecipe() {
  if(!confirm('このレシピを削除しますか？'))return;
  const custom = JSON.parse(localStorage.getItem('customRecipes')||'[]');
  const filtered = custom.filter(r=>r.id!==editorId);
  localStorage.setItem('customRecipes', JSON.stringify(filtered));
  rebuildDB();
  goScreen('home');
}

function rebuildDB() {
  const custom = JSON.parse(localStorage.getItem('customRecipes')||'[]');
  // merge: custom overrides DB entries with same id, then appends new ones
  const overrides = custom.filter(c=>DB.some(d=>d.id===c.id));
  const additions = custom.filter(c=>!DB.some(d=>d.id===c.id));
  const merged = DB.map(d=>{
    const ov = overrides.find(o=>o.id===d.id);
    return ov || d;
  }).concat(additions);
  MAINS.length=0; SIDES.length=0;
  merged.forEach(r=>{ if(r.role==='main') MAINS.push(r); else SIDES.push(r); });
}

// ===================== NAVIGATION =====================
// ホームのレシピ一覧ボタン
function openRecipeList() {
  S.prevScreen = S.curScreen;
  openEditor(null);
}

function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  const nb=document.getElementById('nav-'+name);
  if(nb) nb.classList.add('active');
  S.curScreen=name;
  window.scrollTo(0,0);
}

// ===================== INIT =====================
(function init() {
  rebuildDB();
  restorePlan();
})();
</script>
